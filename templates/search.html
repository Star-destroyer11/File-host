{% extends "layout.html" %}
{% block content %}
<h2>Search Results for "{{ query }}"</h2>

{% if results %}
<ul class="entries">
  {% for entry in results %}
    <li class="{% if entry.type == 'dir' %}dir{% else %}file{% endif %}">
        <a href="{% if entry.type == 'dir' %}/{{ entry.path }}/
                 {% else %}/download/{{ entry.path }}{% endif %}"></a>
        <span class="entry-label">{{ entry.name }}</span>
    </li>
  {% endfor %}
</ul>
{% else %}
<p>No results found.</p>
{% endif %}
{% endblock %}
